<!doctype html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rigobertus Map</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://unpkg.com/maplibre-gl@5.3.1/dist/maplibre-gl.css" rel="stylesheet" />
</head>
<body>
  <header>
    <h1>Rigobertus Map</h1>
    <p>Selecció de llocs recomanats a Girona.</p>
  </header>

  <section class="controls" aria-label="Filtres de cerca">
    <label class="sr-only" for="q">Cerca per text</label>
    <input id="q" type="search" placeholder="Cerca per nom, ciutat, tag..." autocomplete="off" />

    <label class="sr-only" for="city">Filtra per ciutat</label>
    <select id="city"><option value="">Totes les ciutats</option></select>

    <label class="sr-only" for="minRating">Filtra per valoració mínima</label>
    <select id="minRating">
      <option value="">Qualsevol valoració</option>
      <option value="4.5">4.5★ o més</option>
      <option value="4">4★ o més</option>
      <option value="3">3★ o més</option>
    </select>

    <label class="sr-only" for="statusFilter">Filtra per estat</label>
    <select id="statusFilter">
      <option value="">Tots els estats</option>
      <option value="wishlist">Per anar</option>
      <option value="visited">Visitats</option>
    </select>
  </section>

  <p class="legend" aria-label="Llegenda d'estat">
    <span class="legend-item"><span class="dot dot-wishlist"></span> Per anar</span>
    <span class="legend-item"><span class="dot dot-visited"></span> Visitat</span>
  </p>

  <main>
    <p id="status" role="status" aria-live="polite"></p>
    <p id="count" aria-live="polite"></p>
    <section id="featuredPlace" class="featured-place" hidden aria-live="polite"></section>
    <div id="map" aria-label="Mapa de llocs"></div>
    <div id="list" class="grid"></div>
    <button id="retry" type="button" hidden>Tornar a provar</button>
  </main>

  <footer>
    <small>Fet amb ❤️ a GitHub Pages · <span id="buildInfo">build info no disponible</span></small>
  </footer>

  <div id="imageModal" class="image-modal" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="imageModalTitle">
    <h2 id="imageModalTitle" class="sr-only">Galeria d'imatges</h2>
    <button id="imageModalClose" class="image-modal-close" type="button" aria-label="Tancar">✕</button>
    <button id="imageModalPrev" class="image-modal-nav image-modal-prev" type="button" aria-label="Imatge anterior">‹</button>
    <img id="imageModalImg" alt="Imatge ampliada" />
    <button id="imageModalNext" class="image-modal-nav image-modal-next" type="button" aria-label="Imatge següent">›</button>
    <div id="imageModalCounter" class="image-modal-counter" aria-live="polite"></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@5.3.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
